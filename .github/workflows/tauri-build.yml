name: Build desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required to create GitHub Releases and push README/version updates
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Linux system dependencies for WebKitGTK
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      # Build the extract_thumbnails sidecar with PyInstaller.
      #
      # We use the exact --collect-all set verified by ignis-sec/HoMM-OE-Template-Editor
      # to produce a working binary on all platforms. UnityPy lazily imports native
      # texture decoders; PyInstaller's static analysis misses them even with
      # --collect-all UnityPy alone. Without collecting each decoder chain explicitly,
      # UnityPy.load() scans assets fine but every .image decode silently raises and
      # 0 icons are saved.
      #
      #   texture2ddecoder  BC7/DXT decoders
      #   etcpak            ETC/ETC2 decoders
      #   astc_encoder_py   ASTC decoder (astc_encoder has no Python 3.12 release)
      #   archspec          CPU-feature JSON tables read at runtime by astc_encoder_py
      #   fmod_toolkit      native fmod lib; UnityPy asset loader touches audio init
      #                     even for Texture2D-only reads — binary must be present
      #   PIL               PNG encoder for image.save()
      #
      # PyInstaller only targets the host architecture, so each platform runner
      # produces its own binary with the correct target triple suffix.
      - name: Build sidecar binary
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -r src-tauri/sidecar/requirements.txt

          if [ -n "${{ matrix.args }}" ]; then
            TRIPLE=$(echo "${{ matrix.args }}" | sed 's/--target //')
          else
            TRIPLE=$(rustc -vV | awk '/^host:/{print $2}')
          fi

          cd src-tauri/sidecar
          pyinstaller --onefile \
            --collect-all UnityPy \
            --collect-all texture2ddecoder \
            --collect-all etcpak \
            --collect-all astc_encoder_py \
            --collect-all archspec \
            --collect-all fmod_toolkit \
            --collect-all PIL \
            --name "extract_thumbnails-${TRIPLE}" \
            extract_thumbnails.py

          if [[ "$TRIPLE" == *"windows"* ]]; then
            mv "dist/extract_thumbnails-${TRIPLE}.exe" "extract_thumbnails-${TRIPLE}.exe"
          else
            mv "dist/extract_thumbnails-${TRIPLE}" "extract_thumbnails-${TRIPLE}"
          fi

      # Sync tauri.conf.json version with the git tag so artifact filenames
      # match the release tag (e.g. tag v0.1.3 → files named 0.1.3_*)
      - name: Sync app version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      # On a version tag: build AND create a draft GitHub Release
      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Scenario Script Editor ${{ github.ref_name }}
          releaseBody: |
            Desktop release for macOS (Apple Silicon), Windows, and Linux.

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/main) for what changed.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # On manual dispatch or branch push: build only, no release
      - name: Build Tauri app (CI check)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

  # After all platform builds succeed, update README and tauri.conf.json on main
  update-readme:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version and README download links
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          BASE="https://github.com/${{ github.repository }}/releases/download"

          # Sync tauri.conf.json version
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "

          # Update download section header
          sed -i -E "s/Desktop downloads \(v[0-9]+\.[0-9]+\.[0-9]+\)/Desktop downloads (${TAG})/" README.md

          # Update version in all filenames (covers both link text and URLs)
          sed -i -E "s|HommOE\.Scenario\.Editor_[0-9]+\.[0-9]+\.[0-9]+_|HommOE.Scenario.Editor_${VERSION}_|g" README.md

          # Update release tag in download URLs
          sed -i -E "s|releases/download/v[0-9]+\.[0-9]+\.[0-9]+/|releases/download/${TAG}/|g" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md src-tauri/tauri.conf.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ github.ref_name }}"
          git push origin main
