name: Build desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required to create GitHub Releases and push README/version updates
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # Linux system dependencies for WebKitGTK
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install JS dependencies
        run: npm ci

      # Sync tauri.conf.json version with the git tag so artifact filenames
      # match the release tag (e.g. tag v0.1.3 → files named 0.1.3_*)
      - name: Sync app version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "

      # On a version tag: build AND create a draft GitHub Release
      - name: Build Tauri app (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Scenario Script Editor ${{ github.ref_name }}
          releaseBody: |
            Desktop release for macOS (Apple Silicon + Intel), Windows, and Linux.

            See [CHANGELOG](https://github.com/${{ github.repository }}/commits/main) for what changed.
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # On manual dispatch or branch push: build only, no release
      - name: Build Tauri app (CI check)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}

  # After all platform builds succeed, update README and tauri.conf.json on main
  update-readme:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update version and README download links
        shell: bash
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          BASE="https://github.com/${{ github.repository }}/releases/download"

          # Sync tauri.conf.json version
          node -e "
            const fs = require('fs');
            const cfg = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            cfg.version = '${VERSION}';
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(cfg, null, 2) + '\n');
          "

          # Update download section header
          sed -i -E "s/Desktop downloads \(v[0-9]+\.[0-9]+\.[0-9]+\)/Desktop downloads (${TAG})/" README.md

          # Update each platform download URL
          sed -i -E "s|${BASE}/v[0-9.]+/Scenario\.Script\.Editor_[0-9.]+_aarch64\.dmg|${BASE}/${TAG}/Scenario.Script.Editor_${VERSION}_aarch64.dmg|g" README.md
          sed -i -E "s|${BASE}/v[0-9.]+/Scenario\.Script\.Editor_[0-9.]+_x64\.dmg|${BASE}/${TAG}/Scenario.Script.Editor_${VERSION}_x64.dmg|g" README.md
          sed -i -E "s|${BASE}/v[0-9.]+/Scenario\.Script\.Editor_[0-9.]+_x64-setup\.exe|${BASE}/${TAG}/Scenario.Script.Editor_${VERSION}_x64-setup.exe|g" README.md
          sed -i -E "s|${BASE}/v[0-9.]+/Scenario\.Script\.Editor_[0-9.]+_amd64\.AppImage|${BASE}/${TAG}/Scenario.Script.Editor_${VERSION}_amd64.AppImage|g" README.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md src-tauri/tauri.conf.json
          git diff --staged --quiet || git commit -m "chore: bump version to ${{ github.ref_name }}"
          git push origin main
